services:
  rag-service:
    build: .
    container_name: book_halal_rag
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
