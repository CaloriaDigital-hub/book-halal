services:
  postgres:
    image: postgres:16-alpine
    container_name: book_halal_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: book_halal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d book_halal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: book_halal_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: book_halal_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8090:8090"
    volumes:
      - ./backend/static:/app/static
    env_file:
      - ./backend/.env
    restart: unless-stopped

  rag-service:
    build:
      context: ./rag-service-book
      dockerfile: Dockerfile
    container_name: book_halal_rag
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_db
    environment:
      BACKEND_URL: http://book_halal_backend:8090
      TESSDATA_PREFIX: /usr/share/tesseract-ocr/4.00/tessdata
    env_file:
      - ./rag-service-book/.env
    restart: unless-stopped

volumes:
  pgdata:
  chroma_data:
